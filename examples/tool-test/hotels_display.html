<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成都世纪城附近酒店展示</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .hotels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }
        .hotel-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .hotel-card:hover {
            transform: translateY(-5px);
        }
        .hotel-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        .hotel-info {
            padding: 20px;
        }
        .hotel-name {
            font-size: 1.4em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .hotel-address {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .hotel-rating {
            color: #f39c12;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .hotel-type {
            display: inline-block;
            background: #e8f4ff;
            color: #3498db;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>成都世纪城附近酒店展示</h1>
        <div class="hotels-grid">
            <!-- 酒店1：三只猫青年旅社 -->
            <div class="hotel-card" id="hotel1">
                <img src="https://store.is.autonavi.com/showpic/500be110ed9c4c21c9adaa2ef6825f2c" 
                     alt="三只猫青年旅社(世纪城地铁站店)" 
                     class="hotel-image">
                <div class="hotel-info">
                    <div class="hotel-name">1. 三只猫青年旅社(世纪城地铁站店)</div>
                    <div class="hotel-address">地址：天府大道中段天鹅湖公寓25栋2单元1502室</div>
                    <div class="hotel-rating">评分：★★★★☆ 4.5分</div>
                    <span class="hotel-type">青年旅社</span>
                </div>
            </div>

            <!-- 酒店2：悦栖青年旅社 -->
            <div class="hotel-card" id="hotel2">
                <img src="https://store.is.autonavi.com/showpic/3c9ca69aecfa142214b13036c4996f9c" 
                     alt="悦栖青年旅社(世纪城地铁站店)" 
                     class="hotel-image">
                <div class="hotel-info">
                    <div class="hotel-name">2. 悦栖青年旅社(世纪城地铁站店)</div>
                    <div class="hotel-address">地址：天府大道天鹅湖公寓25栋2单元25-2号</div>
                    <div class="hotel-rating">评分：★★★★★ 4.8分</div>
                    <span class="hotel-type">青年旅社</span>
                </div>
            </div>

            <!-- 酒店3：成都世纪精品公寓 -->
            <div class="hotel-card" id="hotel3">
                <img src="https://store.is.autonavi.com/showpic/494043f29d1ace0b9a672eff81fae1d6" 
                     alt="成都世纪精品公寓会展中心店" 
                     class="hotel-image">
                <div class="hotel-info">
                    <div class="hotel-name">3. 成都世纪精品公寓会展中心店</div>
                    <div class="hotel-address">地址：天府大道中段177号天鹅湖公寓</div>
                    <div class="hotel-rating">评分：★★★★☆ 4.3分</div>
                    <span class="hotel-type">精品公寓</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 设置每个标签页的标题
        document.title = "成都世纪城附近酒店展示";
        
        // 如果需要在单独的标签页中打开，可以创建链接
        const hotels = [
            {
                name: "三只猫青年旅社(世纪城地铁站店)",
                url: "https://store.is.autonavi.com/showpic/500be110ed9c4c21c9adaa2ef6825f2c"
            },
            {
                name: "悦栖青年旅社(世纪城地铁站店)",
                url: "https://store.is.autonavi.com/showpic/3c9ca69aecfa142214b13036c4996f9c"
            },
            {
                name: "成都世纪精品公寓会展中心店",
                url: "https://store.is.autonavi.com/showpic/494043f29d1ace0b9a672eff81fae1d6"
            }
        ];

        // 为每个酒店卡片添加点击事件，在新标签页中打开大图
        document.querySelectorAll('.hotel-card').forEach((card, index) => {
            card.addEventListener('click', () => {
                window.open(hotels[index].url, '_blank');
            });
        });
    </script>
</body>
</html>
