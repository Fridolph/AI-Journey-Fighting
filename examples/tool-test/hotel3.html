<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成都世纪精品公寓会展中心店</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
            text-align: center;
        }
        .hotel-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .hotel-image {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .hotel-name {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }
        .hotel-info {
            text-align: left;
            margin-top: 20px;
        }
        .info-item {
            margin-bottom: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        .info-label {
            font-weight: bold;
            color: #555;
        }
        .info-value {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="hotel-container">
        <div class="hotel-name">成都世纪精品公寓会展中心店</div>
        <img src="https://store.is.autonavi.com/showpic/494043f29d1ace0b9a672eff81fae1d6" 
             alt="成都世纪精品公寓会展中心店" 
             class="hotel-image">
        
        <div class="hotel-info">
            <div class="info-item">
                <span class="info-label">地址：</span>
                <span class="info-value">天府大道中段177号天鹅湖公寓</span>
            </div>
            <div class="info-item">
                <span class="info-label">评分：</span>
                <span class="info-value">★★★★☆ 4.3分</span>
            </div>
            <div class="info-item">
                <span class="info-label">类型：</span>
                <span class="info-value">精品公寓</span>
            </div>
            <div class="info-item">
                <span class="info-label">位置：</span>
                <span class="info-value">距离成都世纪城约150米</span>
            </div>
        </div>
    </div>
</body>
</html>
